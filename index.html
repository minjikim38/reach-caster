<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reach Caster — Intelligence Platform</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/fonts-archive/Paperlogy/Paperlogy.css" />
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#475569', // 이미지와 유사한 세련된 슬레이트 그레이
            accent: '#EC4899',  // 화사한 핑크
            bg: '#F8FAFC',      // 깨끗한 바탕색
            purplePXL: '#8B5CF6',
            bluePXL: '#3B82F6'
          }
        }
      }
    }
  </script>
  <style>
    * { font-family: 'Paperlogy', sans-serif; letter-spacing: -0.02em; }
    
    /* 1. 배경 패턴 제거: 회색 점들을 없애고 깨끗한 배경으로 변경 */
    body { background-color: #F8FAFC; margin: 0; }
    
    .fade-in { animation: fadeIn 0.6s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
    
    .folder-body { display: none; }
    .folder-body.open { display: block; animation: slideDown 0.3s ease-out; }
    @keyframes slideDown { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }
    
    .chevron { transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    .chevron.open { transform: rotate(90deg); }

    /* 2. 설문 배너: 이미지 느낌의 은은한 그라데이션과 테두리 */
    .emphasis-banner { 
      position: relative; 
      overflow: hidden; 
      border: 1px solid rgba(236, 72, 153, 0.15) !important; 
      background: linear-gradient(to right, #ffffff, #fdf2f8);
    }

    .emphasis-banner::after { 
      content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; 
      background: linear-gradient(45deg, transparent, rgba(236, 72, 153, 0.08), rgba(139, 92, 246, 0.08), transparent); 
      transform: rotate(45deg); animation: shine 6s infinite; 
    }
    @keyframes shine { 0% { transform: translateX(-100%) rotate(45deg); } 100% { transform: translateX(100%) rotate(45deg); } }
  </style>
</head>
<!-- 3. 글자색 변경: text-slate-900(너무 시커먼 색)에서 text-primary(세련된 회색)로 변경 -->
<body class="text-primary">

  <!-- [1] 로그인 페이지 -->
  <div id="page-login" class="min-h-screen flex items-center justify-center px-4">
    <div class="w-full max-w-[400px] fade-in">
      <div class="bg-white/80 backdrop-blur-xl rounded-2xl shadow-[0_8px_30px_rgba(0,0,0,0.04)] border border-slate-200 overflow-hidden p-10 text-center">
        <div class="flex justify-center mb-8">
          <div class="flex items-center gap-2">
            <div class="w-1.5 h-6 bg-accent rounded-full"></div>
            <span class="text-slate-800 font-bold tracking-tight text-2xl">Reach Caster</span>
          </div>
        </div>
        <h2 class="text-xl font-bold text-slate-800 mb-2">인터뷰 플랫폼 가이드</h2>
        <p class="text-slate-500 text-sm mb-10">성함을 입력해 주세요.</p>
        
        <div class="space-y-4">
          <input id="name-input" type="text" placeholder="이름 입력" class="w-full px-5 py-3.5 rounded-xl bg-slate-50 border border-slate-200 focus:outline-none focus:ring-2 focus:ring-accent/20 focus:border-accent transition-all text-center" />
          <button onclick="handleLogin()" class="w-full py-3.5 bg-slate-800 text-white rounded-xl font-bold text-sm hover:bg-slate-700 transition-all">접속하기</button>
        </div>
      </div>
    </div>
  </div>

  <!-- [2] 대시보드 페이지 -->
  <div id="page-dashboard" class="hidden min-h-screen flex flex-col">
    <nav class="sticky top-0 z-50 bg-white/70 backdrop-blur-md border-b border-slate-100 px-8 py-4">
      <div class="max-w-3xl mx-auto flex items-center justify-between">
        <div class="flex items-center gap-2">
          <div class="w-1 h-4 bg-accent rounded-full"></div>
          <span class="font-bold text-slate-800 text-lg">Reach Caster</span>
        </div>
        <button onclick="handleLogout()" class="text-[10px] font-bold text-slate-400 hover:text-accent uppercase tracking-widest">Logout</button>
      </div>
    </nav>

    <main class="flex-1 max-w-3xl mx-auto w-full px-8 py-12">
      <header class="mb-10 fade-in">
        <div class="inline-block px-2.5 py-1 rounded-full bg-accent/10 text-accent text-[9px] font-bold uppercase tracking-widest mb-4">Intelligence Portal</div>
        <div class="flex items-baseline gap-2">
          <h2 class="text-2xl font-black text-slate-800 tracking-tighter">My Interview.</h2>
          <span class="text-base font-bold text-accent/80" id="display-name"></span>
        </div>
        <p class="text-slate-500 text-[14px] mt-2 leading-relaxed">제공된 자료를 검토하신 후 설문지에 의견을 남겨주세요.</p>
      </header>

      <!-- 설문 배너 -->
      <a id="survey-banner" href="#" target="_blank" rel="noopener"
        class="flex items-center gap-5 bg-white rounded-2xl p-5 mb-8 shadow-sm hover:shadow-md transition-all group emphasis-banner fade-in">
        <div class="flex-shrink-0 w-12 h-12 rounded-xl bg-gradient-to-br from-accent/20 to-purplePXL/20 flex items-center justify-center text-accent">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/></svg>
        </div>
        <div class="flex-1">
          <p class="text-[9px] font-black text-accent uppercase mb-0.5">Priority Task</p>
          <h3 class="text-lg font-bold text-slate-800">인터뷰 참여 설문지</h3>
        </div>
        <div class="px-5 py-2.5 bg-slate-800 text-white rounded-lg font-bold text-xs group-hover:bg-accent transition-colors">Start</div>
      </a>

      <div class="mb-6 flex items-end justify-between fade-in">
        <h4 class="text-xs font-black text-slate-800 uppercase tracking-widest border-b-2 border-accent/30 pb-1">Resources</h4>
      </div>
      
      <div id="folder-list" class="grid gap-4"></div>
    </main>

    <footer class="py-12 border-t border-slate-100 text-[10px] text-slate-400 text-center">
      <p>© 2026 AX Team · Proprietary and Confidential.</p>
    </footer>
  </div>

  <script src="data.js"></script>
  <script>
    // 스크립트 부분은 기존 로직을 유지하되 renderFolders만 조금 더 컴팩트하게 수정했습니다.
    const loginPage = document.getElementById('page-login');
    const dashboardPage = document.getElementById('page-dashboard');
    const nameInput = document.getElementById('name-input');
    const errorMsg = document.getElementById('error-msg');

    nameInput.addEventListener('keydown', e => { if (e.key === 'Enter') handleLogin(); });

    function handleLogin() {
      const name = nameInput.value.trim();
      const data = INTERVIEW_DATA[name];
      if (!data) { errorMsg.classList.remove('hidden'); return; }
      showDashboard(name, data);
    }

    function showDashboard(name, data) {
      document.getElementById('display-name').textContent = name + ' 님';
      document.getElementById('survey-banner').href = data.surveyUrl || '#';
      renderFolders(data.folders || []);
      loginPage.classList.add('hidden');
      dashboardPage.classList.remove('hidden');
    }

    function handleLogout() {
      nameInput.value = '';
      dashboardPage.classList.add('hidden');
      loginPage.classList.remove('hidden');
    }

    function toggleFolder(id) {
      const body = document.getElementById('body-' + id);
      const chevron = document.getElementById('chevron-' + id);
      body.classList.toggle('open');
      chevron.classList.toggle('open');
    }

    function renderFolders(folders) {
      const container = document.getElementById('folder-list');
      container.innerHTML = folders.map((folder, i) => `
        <div class="bg-white rounded-xl border border-slate-100 shadow-sm overflow-hidden">
          <button onclick="toggleFolder(${i})" class="w-full flex items-center gap-4 px-5 py-5 text-left hover:bg-slate-50 transition-all">
            <div class="w-9 h-9 rounded-lg bg-slate-800 text-white flex items-center justify-center">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 7a2 2 0 012-2h4l2 2h8a2 2 0 012 2v8a2 2 0 01-2 2H5a2 2 0 01-2-2V7z"/></svg>
            </div>
            <div class="flex-1">
              <p class="font-bold text-slate-800 text-base">${folder.name}</p>
            </div>
            <svg id="chevron-${i}" class="chevron w-4 h-4 text-slate-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
          </button>
          <div id="body-${i}" class="folder-body">
            <div class="px-5 pb-5 grid grid-cols-1 ${folder.resources.length === 2 ? 'md:grid-cols-2' : 'md:grid-cols-3'} gap-3">
              ${folder.resources.map(r => `
                <a href="${r.url}" target="_blank" class="flex items-center gap-3 px-4 py-3 rounded-xl bg-slate-50 border border-slate-100 text-[13px] font-bold text-slate-600 hover:border-accent/30 hover:bg-white transition-all">
                  <div class="w-7 h-7 rounded bg-white border border-slate-100 flex items-center justify-center text-slate-400">
                    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 10v6m0 0l-3-3m3 3l3-3M3 17V7a2 2 0 012-2h6l2 2h6a2 2 0 012 2v8a2 2 0 01-2 2H5a2 2 0 01-2-2z" stroke-width="2"/></svg>
                  </div>
                  <span class="truncate">${r.label}</span>
                </a>`).join('')}
            </div>
          </div>
        </div>`).join('');
    }
  </script>
</body>
</html>
