<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reach Caster — 인터뷰 플랫폼</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/fonts-archive/Paperlogy/Paperlogy.css" />
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#1A365D',
            accent: '#F472B6',
            bg: '#F8F9FA',
          }
        }
      }
    }
  </script>
  <style>
    * { font-family: 'Paperlogy', sans-serif; }
    .fade-in { animation: fadeIn 0.5s ease-in-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    .card-hover { transition: all 0.25s ease; }
    .card-hover:hover { transform: translateY(-3px); box-shadow: 0 12px 32px rgba(26,54,93,0.12); }
    .folder-body { display: none; }
    .folder-body.open { display: block; }
    .chevron { transition: transform 0.25s ease; }
    .chevron.open { transform: rotate(90deg); }
    .char-btn.selected { border-color: #F472B6; background-color: #FFF5F7; transform: scale(1.1); }
    /* 설문 배너를 강조하는 애니메이션 */
    @keyframes pulse-soft {
      0% { box-shadow: 0 0 0 0 rgba(244, 114, 182, 0.4); }
      70% { box-shadow: 0 0 0 10px rgba(244, 114, 182, 0); }
      100% { box-shadow: 0 0 0 0 rgba(244, 114, 182, 0); }
    }
    .emphasis-banner {
      animation: pulse-soft 2s infinite;
      border: 2px solid #F472B6 !important; /* 핑크색 테두리 강조 */
    }
  </style>
</head>
<body class="bg-bg min-h-screen">

  <!-- 메인 페이지: 이름 입력 -->
  <div id="page-login" class="min-h-screen flex flex-col items-center justify-center px-4 fade-in">
    <div class="w-full max-w-md">
      <div class="text-center mb-12">
        <div class="inline-flex items-center gap-2 mb-4">
          <div class="w-2 h-8 bg-accent rounded-full"></div>
          <span class="text-3xl font-bold text-primary tracking-tight">Reach Caster</span>
        </div>
        <p class="text-slate-500 text-sm leading-relaxed">
          인터뷰 플랫폼에 오신 것을 환영합니다.<br />
          <span class="font-bold text-slate-500">본인의 이름을 입력하여 시작하세요.</span>
        </p>
      </div>

      <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-8">
        <!-- 캐릭터 선택 섹션 -->
        <label class="block text-xs font-semibold text-primary uppercase tracking-widest mb-4 text-center">나의 인터뷰어 캐릭터 선택</label>
        <div class="flex justify-center gap-4 mb-8" id="character-selector">
          <button onclick="selectChar('🐻')" class="char-btn text-3xl p-2 rounded-xl border-2 border-transparent bg-slate-50 hover:bg-slate-100 transition-all">🐻</button>
          <button onclick="selectChar('🐰')" class="char-btn text-3xl p-2 rounded-xl border-2 border-transparent bg-slate-50 hover:bg-slate-100 transition-all">🐰</button>
          <button onclick="selectChar('🐱')" class="char-btn text-3xl p-2 rounded-xl border-2 border-transparent bg-slate-50 hover:bg-slate-100 transition-all">🐱</button>
          <button onclick="selectChar('🦊')" class="char-btn text-3xl p-2 rounded-xl border-2 border-transparent bg-slate-50 hover:bg-slate-100 transition-all">🦊</button>
        </div>
        <label class="block text-xs font-semibold text-primary uppercase tracking-widest mb-3">이름 입력</label>
        <input
          id="name-input"
          type="text"
          placeholder="김민지"
          class="w-full px-4 py-3.5 rounded-xl border border-slate-200 text-primary placeholder-slate-300 text-base focus:outline-none focus:ring-2 focus:ring-accent/40 focus:border-accent transition"
        />
        <p id="error-msg" class="text-accent text-xs mt-2 hidden">등록된 이름을 찾을 수 없습니다. 다시 확인해 주세요.</p>
        <button
          onclick="handleLogin()"
          class="mt-5 w-full py-3.5 bg-primary text-white rounded-xl font-semibold text-sm tracking-wide hover:bg-primary/90 active:scale-[0.98] transition-all"
        >
          입장하기
        </button>
      </div>

      <p class="text-center text-xs text-slate-400 mt-6">
        AX Team · Reach Caster 고도화 프로젝트
      </p>
    </div>
  </div>

  <!-- 대시보드 페이지 -->
  <div id="page-dashboard" class="hidden min-h-screen px-4 py-12">
    <div class="max-w-2xl mx-auto">

      <!-- 헤더 -->
      <div class="flex items-center justify-between mb-8 fade-in">
        <div>
          <p class="text-xs font-semibold text-accent uppercase tracking-widest mb-1">Welcome</p>
          <h1 class="text-2xl font-bold text-primary">
            <span id="display-char" class="mr-1"></span> <!-- 캐릭터 공간 -->
            <span id="display-name"></span>님의 인터뷰 자료
          </h1>
        </div>
        <button
          onclick="handleLogout()"
          class="text-xs text-slate-400 hover:text-primary transition px-3 py-1.5 rounded-lg hover:bg-slate-100"
        >
          <span>⬅️</span> 나가기
        </button>
      </div>

      <!-- 구글 설문 배너 (강조 버전) -->
      <a id="survey-banner" href="#" target="_blank" rel="noopener"
        class="flex items-center gap-5 bg-pink-50 border-2 border-accent rounded-2xl px-6 py-6 mb-8 card-hover fade-in group emphasis-banner">
        
        <!-- 아이콘 강조 -->
        <div class="flex-shrink-0 w-14 h-14 rounded-2xl bg-accent flex items-center justify-center shadow-lg group-hover:scale-110 transition-transform">
          <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
          </svg>
        </div>

        <div class="flex-1">
          <div class="flex items-center gap-2 mb-1">
            <span class="flex h-2 w-2 rounded-full bg-accent animate-ping"></span>
            <p class="text-xs font-bold text-accent uppercase tracking-widest">필수 참여</p>
          </div>
          <p class="text-lg font-bold text-primary">아래 파일들을 확인 후, 설문에 참여해주세요.</p>
          <p class="text-sm text-slate-500 mt-1 line-clamp-1">클릭하면 구글 설문 페이지로 이동합니다.</p>
        </div>

        <div class="bg-white p-2 rounded-full shadow-sm group-hover:bg-accent group-hover:text-white transition-colors">
          <svg class="w-5 h-5 text-accent group-hover:text-white transition" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7l5 5m0 0l-5 5m5-5H6"/>
          </svg>
        </div>
      </a>

      <!-- 폴더 리스트 -->
      <div id="folder-list" class="space-y-3"></div>

      <p class="text-center text-xs text-slate-400 mt-10">
        AX Team · Reach Caster 고도화 프로젝트
      </p>
    </div>
  </div>

  <script src="data.js"></script>
  <script>
    const loginPage = document.getElementById('page-login');
    const dashboardPage = document.getElementById('page-dashboard');
    const nameInput = document.getElementById('name-input');
    const errorMsg = document.getElementById('error-msg');

    nameInput.addEventListener('keydown', e => { if (e.key === 'Enter') handleLogin(); });

    // 1. 로그인 핸들러 (캐릭터 미선택 방지 포함)
    function handleLogin() {
      const name = nameInput.value.trim();
      const data = INTERVIEW_DATA[name];

      // 캐릭터 선택 확인 (선택 안 했으면 알림)
      if (selectedCharacter === '✨') {
        alert('나의 인터뷰어 캐릭터를 선택해 주세요! 🐻🐰🐱🦊');
        return;
      }

      if (!data) {
        errorMsg.classList.remove('hidden');
        nameInput.classList.add('border-accent');
        return;
      }
      
      errorMsg.classList.add('hidden');
      nameInput.classList.remove('border-accent');
      showDashboard(name, data);
    }

    // 2. 대시보드 표시 (운세 랜덤 출력 핵심)
    function showDashboard(name, data) {
      document.getElementById('display-name').textContent = name;
      document.getElementById('display-char').textContent = selectedCharacter;
      
      const randomMent = MENT_LIST[Math.floor(Math.random() * MENT_LIST.length)];
      
      const welcomeText = document.querySelector('#page-dashboard p.text-accent');
      if (welcomeText) {
        welcomeText.textContent = `🔮 ${randomMent}`;
        
        // --- 부담스럽지 않게 세련된 스타일로 변경 ---
        welcomeText.style.textTransform = 'none';
        welcomeText.style.letterSpacing = 'normal';
        // 너무 크지 않은 text-base(16px)에 굵기만 주어 가독성 확보
        welcomeText.className = "text-base font-bold text-accent mb-2 fade-in block";
      }

      document.getElementById('survey-banner').href = data.surveyUrl || DEFAULT_SURVEY_URL;
      renderFolders(data.folders || []);
      
      loginPage.classList.add('hidden');
      dashboardPage.classList.remove('hidden');
    }
    
    function toggleFolder(id) {
      const body = document.getElementById('body-' + id);
      const chevron = document.getElementById('chevron-' + id);
      body.classList.toggle('open');
      chevron.classList.toggle('open');
    }

    function renderFolders(folders) {
      const container = document.getElementById('folder-list');

      if (!folders || folders.length === 0) {
        container.innerHTML = `
          <div class="bg-white rounded-2xl border border-slate-100 p-8 text-center text-slate-400 text-sm fade-in">
            준비 중인 자료가 곧 업로드될 예정입니다.
          </div>`;
        return;
      }

      container.innerHTML = folders.map((folder, i) => `
        <div class="bg-white border border-slate-100 rounded-2xl overflow-hidden fade-in card-hover" style="animation-delay:${i * 0.08}s">

          <!-- 폴더 헤더 (클릭 시 열림/닫힘) -->
          <button onclick="toggleFolder(${i})" class="w-full flex items-center gap-4 px-6 py-4 text-left group">
            <div class="flex-shrink-0 w-10 h-10 rounded-xl bg-primary/5 flex items-center justify-center">
              <svg class="w-5 h-5 text-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M3 7a2 2 0 012-2h4l2 2h8a2 2 0 012 2v8a2 2 0 01-2 2H5a2 2 0 01-2-2V7z"/>
              </svg>
            </div>
            <div class="flex-1">
              <p class="font-bold text-primary text-base">${folder.name}</p>
              <p class="text-xs text-slate-400 mt-0.5">${folder.resources.length}개 자료</p>
            </div>
            <svg id="chevron-${i}" class="chevron w-4 h-4 text-slate-300 group-hover:text-primary transition" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
            </svg>
          </button>

          <!-- 폴더 내용 -->
          <div id="body-${i}" class="folder-body">
            <div class="px-6 pb-4 space-y-2 border-t border-slate-50 pt-3">
              ${folder.resources.length === 0
                ? `<p class="text-xs text-slate-400 py-2 text-center">준비 중인 자료입니다.</p>`
                : folder.resources.map(r => resourceButton(r)).join('')
              }
            </div>
          </div>

        </div>
      `).join('');
    }

    function resourceButton(r) {
      const isExcel = /\.(xlsx|xls|csv)$/i.test(r.label) || /\.(xlsx|xls|csv)$/i.test(r.url);
      const icon = isExcel
        ? `<svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3M3 17V7a2 2 0 012-2h6l2 2h6a2 2 0 012 2v8a2 2 0 01-2 2H5a2 2 0 01-2-2z"/></svg>`
        : `<svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/></svg>`;
      const style = isExcel
        ? 'text-primary bg-primary/5 border-primary/10 hover:bg-primary hover:text-white'
        : 'text-accent bg-accent/5 border-accent/10 hover:bg-accent hover:text-white';
      const badge = isExcel
        ? `<span class="ml-auto text-xs px-2 py-0.5 rounded-full bg-primary/10 text-primary font-medium flex-shrink-0">Excel</span>`
        : `<span class="ml-auto text-xs px-2 py-0.5 rounded-full bg-accent/10 text-accent font-medium flex-shrink-0">Link</span>`;

      return `
        <a href="${r.url}" target="_blank" rel="noopener"
          class="flex items-center gap-3 px-4 py-3 rounded-xl border text-sm font-medium transition-all ${style}">
          ${icon}
          <span class="truncate">${r.label}</span>
          ${badge}
        </a>`;
    }

    // 3. 로그아웃 (상태 초기화)
    function handleLogout() {
      nameInput.value = '';
      selectedCharacter = '✨'; // 초기화
      document.querySelectorAll('.char-btn').forEach(btn => btn.classList.remove('selected'));
      dashboardPage.classList.add('hidden');
      loginPage.classList.remove('hidden');
    }
    
    // 4. 데이터 및 캐릭터 선택 (스크립트 최하단)
    let selectedCharacter = '✨'; // 기본값
    const MENT_LIST = [
      "오늘의 운세: '뜻밖의 행운이 당신을 기다리고 있습니다. 자신감을 가지세요!' ✨",
      "오늘의 운세: '오늘은 사소한 배려가 큰 고마움으로 돌아오는 날입니다' 🍀",
      "오늘의 운세: '막혔던 일들이 술술 풀릴 징조입니다. 기분 좋게 시작해 보세요' ☀️",
      "오늘의 운세: '주변 사람들에게 의견을 구하면 예상치 못한 답을 얻을 거예요' 💡",
      "오늘의 운세: '오늘은 뭘 해도 되는 날! 당신의 직감을 믿고 나아가세요' 🚀",
      "오늘의 운세: '차 한 잔의 여유가 당신에게 놀라운 영감을 선사할 것입니다' ☕",
      "오늘의 운세: '웃음은 최고의 행운 부적입니다. 오늘 많이 웃는 하루 되세요' 😊",
      "오늘의 운세: '포기하려던 일이 있다면 한 번만 더 시도해 보세요. 성공이 머지않았습니다' 💎"
    ];
    
    // 추가: 캐릭터 선택 함수
    function selectChar(emoji) {
      selectedCharacter = emoji;
      document.querySelectorAll('.char-btn').forEach(btn => {
        btn.classList.toggle('selected', btn.innerText === emoji);
      });
    }
    
  </script>
</body>
</html>
